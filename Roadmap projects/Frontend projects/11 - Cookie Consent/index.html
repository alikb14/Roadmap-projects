<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cookie Consent</title>
</head>

<body>
    <div class="container">
        <div class="cookie">
            <h2>Cookie</h2>
            <p>This site uses cookies to offer you a better browsing experience. Find our more on <a href="#">how we use
                    cookies and
                    how you can change your settings.</a></p>
            <div class="buttons">
                <button class="accept">Accept</button>
                <button class="reject">Reject</button>
            </div>
        </div>
    </div>
    <script src="./scripts.js"></script>
</body>

</html>
